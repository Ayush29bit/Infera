version: "3.9"

# ── Production docker-compose for Infera ──────────────────────────────────────
#
# Services:
#   backend  — FastAPI RAG API (port 8000 internal)
#   frontend — React + Nginx reverse proxy (port 80 external)
#
# Usage:
#   1. Copy .env.example to .env and fill in your secrets
#   2. docker-compose up --build -d
#   3. Visit http://localhost
#
# To view logs:     docker-compose logs -f backend
# To stop:          docker-compose down
# To reset volumes: docker-compose down -v

services:

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infera_backend
    restart: unless-stopped

    env_file:
      - .env

    environment:
      # These override .env if set — useful for CI/CD
      ENV: production
      DATABASE_URL: sqlite:////app/data/compliance_assistant.db

    volumes:
      # Persist SQLite database across restarts
      - backend_db:/app/data
      # Persist uploaded files across restarts
      - uploaded_files:/app/uploaded_files
      # HuggingFace model cache — avoids re-downloading on every restart
      - hf_cache:/root/.cache/huggingface

    ports:
      # Expose internally only — nginx proxies from outside
      - "127.0.0.1:8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # Extra time for model downloads on first start

    networks:
      - infera_net

    # Resource limits — prevent runaway memory from model loading
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # React + Nginx Frontend 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points the frontend at nginx which proxies to backend
        VITE_API_URL: http://localhost/api
    container_name: infera_frontend
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy   # Wait for backend health check to pass

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - infera_net

# Volumes 
  backend_db:
    driver: local
    name: infera_backend_db

  uploaded_files:
    driver: local
    name: infera_uploaded_files

  hf_cache:
    driver: local
    name: infera_hf_cache

# Network
networks:
  infera_net:
    driver: bridge
    name: infera_network
